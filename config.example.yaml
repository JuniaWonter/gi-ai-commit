# DeepSeek API 配置
deepseek:
  # API Key (必填)
  # 从 https://platform.deepseek.com 获取
  api_key: "sk-your-api-key-here"
  
  # 模型名称
  model: "deepseek-chat"
  
  # API 基础 URL
  base_url: "https://api.deepseek.com"
  
  # 请求超时时间
  timeout: "30s"

# Commit 配置
commit:
  # 默认 scope (可留空)
  default_scope: ""
  
  # Diff 最大行数，避免 token 超限
  max_diff_lines: 500

# Diff 处理配置（三级降级策略）
diff_prompt:
  # 完整 diff 最大字节数（约 24KB）
  max_full_diff_bytes: 24000
  # 压缩摘要最大字节数（约 16KB）
  max_compact_diff_bytes: 16000
  # 单文件 diff 最大字节数（约 2.2KB）
  max_per_file_diff_bytes: 2200
  # 压缩摘要最大文件数
  max_compact_diff_files: 12
